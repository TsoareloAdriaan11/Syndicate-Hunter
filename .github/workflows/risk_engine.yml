# .github/workflows/risk_engine.yml
#
# Financial Risk Engine — Autonomous CI/CD Pipeline
#
# Triggers:
#   • Scheduled: Every 6 hours (cron)
#   • Manual: "Run workflow" button in GitHub Actions UI

name: Financial Risk Engine

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  run-risk-engine:
    name: Run Financial Risk Engine
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Execute Financial Risk Engine
        env:
          NEO4J_URI:             ${{ secrets.NEO4J_URI }}
          NEO4J_USERNAME:        ${{ secrets.NEO4J_USERNAME }}
          NEO4J_PASSWORD:        ${{ secrets.NEO4J_PASSWORD }}
          ALERT_EMAIL_SENDER:    ${{ secrets.ALERT_EMAIL_SENDER }}
          ALERT_EMAIL_PASSWORD:  ${{ secrets.ALERT_EMAIL_PASSWORD }}
          ALERT_EMAIL_RECIPIENT: ${{ secrets.ALERT_EMAIL_RECIPIENT }}
          GITHUB_RUN_ID:         ${{ github.run_id }}
        run: |
          cd src
          python main.py

      # ── Upload full HTML report as downloadable artifact ─────────────────
      - name: Upload anomaly report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: risk-report-${{ github.run_id }}
          path: src/risk_report_*.html
          retention-days: 90

      # ── Upload logs ───────────────────────────────────────────────────────
      - name: Upload run log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: risk-engine-log-${{ github.run_id }}
          path: src/
          retention-days: 30
